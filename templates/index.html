<!DOCTYPE html>
<html>
<head>
    <title>LocateNet - Public Portal</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; background: #f4f7f6; }
        .portal-box { background: white; padding: 30px; display: inline-block; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 350px; }
        .btn { display: block; padding: 15px; margin: 10px 0; text-decoration: none; color: white; border-radius: 5px; font-weight: bold; }
        .btn-report { background: #e74c3c; }
        .btn-search { background: #3498db; }
        .btn-login { background: #7f8c8d; }
        hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
    </style>
</head>
<body>
    <h1>LocateNet</h1>
    <div class="portal-box">
        <h3>Public Services</h3>
        <a href="/report_sighting" class="btn btn-report">Report a Sighting</a>
        <a href="/search" class="btn btn-search">Search Cases</a>
        
        <hr>
        
        <h3>Secure Access</h3>
        <a href="/login" class="btn btn-login">Admin / Officer Login</a>
    </div>
</body>
</html>
